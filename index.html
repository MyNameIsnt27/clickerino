<!DOCTYPE html>
<html>
<head>
  <title>Clickerino</title>

  <!-- Conecta el CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>clickerino</h1>
  
  ---Clicks---

  <!-- Aquí se muestra el número -->
  <p id="contador">0</p>
  
  --Potencia de Click--
   
  <p id="sumador">1</p>
  
  -Auto Clicks-
  
  <p id="auto">0</p>


  <!-- Botón para sumar -->
  <button id="boton">+1 Click</button>
  <button id="boton2">+1 Power Click</button>
  <button id="botonauto">+1 Auto Clicks</button>



  <!-- Botón para resetear -->
  <button id="reset">Reset</button>

  <!-- Conecta el JavaScript -->
  <script src="script.js"></script>

</body>
</html>
